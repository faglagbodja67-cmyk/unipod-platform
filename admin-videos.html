e<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIPOD - Gestion des Vidéos</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        .video-form {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .video-form h2 {
            margin-bottom: 16px;
            color: #0a2540;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .btn-primary {
            background: #22c55e;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .video-list {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .video-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #eee;
        }

        .video-item:last-child {
            border-bottom: none;
        }

        .video-info h4 {
            margin: 0 0 4px 0;
            color: #0a2540;
        }

        .video-info small {
            color: #666;
        }

        .preview-btn {
            background: #1f6feb;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 8px;
        }
    </style>
</head>

<body>
    <section class="uni-badge">
        <img src="logo.png" alt="Logo Universite de Lome">
        <span>Universite de Lome</span>
    </section>

    <main class="admin-page">
        <header class="admin-header">
            <h1>Gestion des Vidéos</h1>
            <p>Ajouter, modifier ou supprimer les vidéos de la page pub.</p>
            <div class="admin-links">
                <a href="/">Accueil</a>
                <a href="/admin">Tableau de bord</a>
                <a href="/pub-video">Voir la page vidéos</a>
                <button id="logout-btn" type="button">Deconnexion</button>
            </div>
        </header>

        <section class="video-form">
            <h2>Ajouter une nouvelle vidéo</h2>
            <form id="video-form">
                <div class="form-group">
                    <label>Titre de la vidéo *</label>
                    <input type="text" id="video-title" required placeholder="Ex: Témoignage entrepreneur 2026">
                </div>
                <div class="form-group">
                    <label>URL YouTube (lien embed) *</label>
                    <input type="url" id="video-url" required placeholder="https://www.youtube.com/embed/...">
                    <small>Format: https://www.youtube.com/embed/VIDEO_ID</small>
                </div>
                <div class="form-group">
                    <label>Catégorie</label>
                    <select id="video-category">
                        <option value="Institutionnel">Institutionnel</option>
                        <option value="Temoignage">Témoignage</option>
                        <option value="Evenement">Événement</option>
                        <option value="Formation">Formation</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Ajouter la vidéo</button>
            </form>
        </section>

        <section class="video-list">
            <h2>Vidéos existantes</h2>
            <div id="videos-container"></div>
        </section>
    </main>

    <script src="admin-videos.js"></script>
</body>

</html>
