<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIPOD - Connexion Admin</title>
    <link rel="stylesheet" href="admin-login.css">
</head>
<body>
    <section class="uni-badge">
        <img src="logo.png" alt="Logo Université de Lomé">
        <span>Université de Lomé</span>
    </section>
    <main class="login-page">
        <section class="login-card">
            <h1>Connexion Admin</h1>
            <p>Connectez-vous pour acceder au tableau des inscriptions par domaine.</p>

            <form id="admin-login-form" novalidate>
                <label for="email">Email admin</label>
                <input id="email" name="email" type="email" autocomplete="username" required>

                <label for="password">Mot de passe</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                <button id="login-btn" type="submit">Se connecter</button>
            </form>

            <p id="login-status" class="status"></p>
            <div class="links">
                <a href="/admin-reset">Mot de passe oublie ?</a>
                <a href="/">Retour accueil</a>
                <a href="/inscription?domain=autre&source=admin-login">Formulaire inscription</a>
            </div>
        </section>
    </main>

    <script src="admin-login.js"></script>
</body>
</html>
