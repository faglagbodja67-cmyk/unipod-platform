<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIPOD - Pub Video</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >
    <link rel="stylesheet" href="pub-video.css">
</head>
<body>
<section class="brand-strip">
    <div class="brand-item university">
        <img src="logo.png" alt="Logo Université de Lomé">
        <span>Université de Lomé</span>
    </div>
    <div class="brand-item">
        <img src="Unipod-logo.016fe425.png" alt="Logo UNIPOD">
        <span>UNIPOD</span>
    </div>
    <div class="brand-item pnud">
        <img src="pnud-logo.svg" alt="Logo PNUD">
        <span>PNUD</span>
    </div>
</section>

<header>
    <div class="logo">
        <img src="Unipod-logo.016fe425.png" alt="Logo UNIPOD">
        <span>UNIPOD</span>
    </div>
    <nav>
        <a href="/">Accueil</a>
        <a href="#videos">Videos</a>
        <a href="/bibliotheque">Bibliothèque</a>
        <a href="/inscription?domain=videos&source=pub-video">Inscription</a>
        <a href="/admin-login">Admin</a>
    </nav>
</header>

<section class="hero">
    <h1>Nos Pubs Video</h1>
    <p>Decouvre les spots promo et temoignages des entrepreneurs UNIPOD.</p>
</section>

<section id="videos" class="video-grid"></section>

<footer>
    <p>© 2026 UNIPOD - Lomé | Vidéos d'entrepreneuriat</p>
    <div class="social-icons">
        <a href="https://youtube.com/@unipod/videos" target="_blank" rel="noopener noreferrer" aria-label="YouTube videos entrepreneuriat"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://www.tiktok.com/@unipod" target="_blank" rel="noopener noreferrer" aria-label="TikTok videos entrepreneuriat"><i class="fa-brands fa-tiktok"></i></a>
        <a href="https://www.instagram.com/unipod/reels/" target="_blank" rel="noopener noreferrer" aria-label="Instagram Reels entrepreneuriat"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.linkedin.com/company/unipod/posts/?feedView=videos" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn videos entrepreneuriat"><i class="fa-brands fa-linkedin-in"></i></a>
    </div>
</footer>
<script src="pub-video.js"></script>

</html>
